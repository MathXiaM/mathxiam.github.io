<!-- 1. 文档声明：告诉浏览器这是HTML5标准网页，必须写在第一行 -->
<!DOCTYPE html>

<!-- 2. 网页根标签：所有代码都要写在这对标签里 -->
<html>

<!-- 3. 网页头部：配置网页的基础信息（用户看不见） -->
<head>
    <!-- 编码格式：UTF-8，防止中文乱码（姓名、单位中文正常显示） -->
    <meta charset="utf-8">
    <!-- 浏览器标签页标题：打开网页时，浏览器顶部显示的文字 -->
    <title>Your Name</title>

    <!-- 4. 样式代码：控制网页的字体、颜色、排版（学术极简风核心） -->
    <style>
        /* 整体页面样式：所有内容的通用规则 */
        body {
            max-width: 820px;       /* 网页最大宽度，避免太宽不好读 */
            margin: 50px auto;      /* 上下留白50px，页面居中显示 */
            padding: 0 30px;        /* 左右留白，手机上不会贴边 */
            font-family: "Times New Roman", serif;  /* 学术专用字体，正式美观 */
            font-size: 17px;        /* 正文文字大小，阅读舒适 */
            color: #222;            /* 文字颜色：深灰色（护眼、专业） */
            line-height: 1.7;       /* 行间距，文字不拥挤 */
        }
        /* 一级标题样式：你的姓名 */
        h1 {
            font-size: 28px;        /* 姓名文字大小 */
            font-weight: normal;    /* 不加粗，简约学术风 */
            margin-bottom: 10px;    /* 姓名下方留白 */
        }
        /* 二级标题样式：研究方向、论文、教学等小标题 */
        h2 {
            font-size: 20px;        /* 小标题文字大小 */
            font-weight: normal;    /* 不加粗 */
            margin-top: 35px;       /* 小标题上方留白，分区清晰 */
            border-bottom: 1px solid #ddd;  /* 小标题下方加横线，分隔模块 */
            padding-bottom: 5px;    /* 横线和文字的距离 */
        }
        /* 链接样式：CV、论文等可点击的文字 */
        a {
            color: #0055aa;         /* 链接颜色：深蓝色（学术标准色） */
            text-decoration: none;  /* 去掉链接默认的下划线 */
        }
        /* 鼠标悬停链接时的样式 */
        a:hover {
            text-decoration: underline;  /* 鼠标放上去显示下划线 */
        }
    </style>
</head>

<!-- 5. 网页主体：用户能看到的所有内容（你的学术信息） -->
<body>
    <!-- 一级标题：你的姓名（中英文都可以） -->
    <h1>夏明洋 Mingyang XIA</h1>
    <!-- 普通段落：职位 + 单位 -->
    <p>Assistant Professor, Dalian University of Technology</p>
    <!-- 普通段落：邮箱 -->
    <p>Office: Math-204</p>
    <p>Email: xiamingyang AT dlut DOT edu DOT cn</p>

    <!-- 二级标题：研究方向 -->
    <h2>Research Interests</h2>
    <!-- 普通段落：填写你的研究领域 -->
    <p>Differentiable Dynamical Systems</p>

    <!-- 二级标题：论文成果 -->
    <h2>Publications</h2>
    <!-- 普通段落：填写你的论文、著作列表 -->
    <p>论文列表、著作</p>

    <!-- 二级标题：教学工作 -->
    <h2>Teaching</h2>
    <!-- 普通段落：填写你教授的课程 -->
    <p>授课课程</p>

    <!-- 二级标题：个人简历 -->
    <h2>CV</h2>
    <!-- 链接：点击跳转到简历PDF（后期上传PDF后修改文件名即可） -->
    <p><a href="cv.pdf">Curriculum Vitae</a></p>
</body>

<!-- 网页结束标签 -->
</html>
